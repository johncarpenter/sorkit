# sor.yaml — Surface-Oracle-Ratchet configuration
# Drop this file into your project root and edit to match your codebase.

project_name: "My Project"

# Paths always frozen (tests, fixtures, config the agent must not touch)
always_frozen:
  - "fixtures/"
  - "tests/"
  - "sor.yaml"
  - "CLAUDE.md"
  - ".claude/"
  - "results.tsv"

# Global defaults (layers can override)
defaults:
  test_runner: "python -m pytest"
  max_attempts: 20
  consecutive_failure_limit: 5
  plateau_limit: 5
  diminishing_threshold: 0.005
  diminishing_window: 5

# Layers are worked bottom-up. Each completed layer freezes before the next.
layers:
  - name: "search"
    # Files the agent CAN modify
    surface:
      - "src/search/query_builder.py"
      - "src/search/ranker.py"
      - "src/search/embedder.py"

    oracle:
      # Contract tests: must all pass (binary). Run first.
      contracts: "tests/test_search_contract.py"

      # Scored tests: extract numeric metrics from stdout
      scored: true
      scored_tests: "tests/test_search_relevance.py"
      metrics:
        - name: "relevance"
          extract: "RELEVANCE_SCORE"   # grep pattern in test stdout
          weight: 0.7
        - name: "value_accuracy"
          extract: "VALUE_ACCURACY"
          weight: 0.3

    thresholds:
      target_score: 0.90
      max_attempts: 30

  - name: "api"
    surface:
      - "src/api/main.py"
      - "src/api/schemas.py"
      - "src/api/auth.py"

    oracle:
      contracts: "tests/test_api_*.py"
      scored: false

    thresholds:
      max_attempts: 15

  - name: "vba"
    surface:
      - "vba/ItemSearch.bas"
      - "vba/config.bas"

    oracle:
      contracts: "tests/test_excel_*.py"
      scored: false

    thresholds:
      max_attempts: 10
